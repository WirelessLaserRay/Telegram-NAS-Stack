server {
    listen 8082;
    client_max_body_size 0;
    
    # In true local mode, getFile returns an absolute path starting with /var/lib/telegram-bot-api
    # TgNAS sends: GET /file/bot<token>/var/lib/telegram-bot-api/<token>/documents/file_x
    location ~ ^/file/bot([^/]+)/var/lib/telegram-bot-api/(.*)$ {
        alias /var/lib/telegram-bot-api/$2;
    }

    # For relative paths (fallback)
    location ~ ^/file/bot([^/]+)/(.*)$ {
        alias /var/lib/telegram-bot-api/$1/$2;
    }

    # Proxy API requests
    location / {
        proxy_read_timeout 3600;
        proxy_send_timeout 3600;
        proxy_connect_timeout 3600;
        proxy_pass http://localhost:8081;
    }
}
