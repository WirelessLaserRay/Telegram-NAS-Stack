services:
  tgnas:
    container_name: tgnas
    image: tgnas:local
    build:
      context: ./repo
      dockerfile: Dockerfile
    command: ["tgnas", "-debug"]
    ports:
      - "${TGNAS_PORT_EXPOSED:-9000}:9000"
    volumes:
      - ./data:/app/data
    environment:
      TGNAS_SECRET_KEY: ${TGNAS_SECRET_KEY}
      TGNAS_TELEGRAM_CHAT_ID: ${TGNAS_TELEGRAM_CHAT_ID}
      TGNAS_TELEGRAM_BOT_TOKEN: ${TGNAS_TELEGRAM_BOT_TOKEN}
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      NO_PROXY: ${NO_PROXY:-127.0.0.0/8,localhost,host.docker.internal}
    restart: unless-stopped

  tgnas-sync:
    container_name: tgnas_sync
    image: python:3.11-alpine
    command: ["python", "-u", "/app/sync_mobile.py"]
    volumes:
      - ./data:/app/data
      - ./sync_mobile.py:/app/sync_mobile.py:ro
    environment:
      TGNAS_TELEGRAM_CHAT_ID: ${TGNAS_TELEGRAM_CHAT_ID}
      TGNAS_TELEGRAM_BOT_TOKEN: ${TGNAS_TELEGRAM_BOT_TOKEN}
      BOT_API_URL: "http://host.docker.internal:8082"
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      NO_PROXY: ${NO_PROXY:-127.0.0.0/8,localhost,host.docker.internal}
    restart: unless-stopped

